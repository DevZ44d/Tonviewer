# ─────────────────────────────────────────────────────────────────────────────
#  Tonviewer — Dependency Review
#  Scans new / changed dependencies in PRs for known vulnerabilities.
# ─────────────────────────────────────────────────────────────────────────────

name: Dependency Review

on:
  pull_request:
    branches: [main]

jobs:

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
